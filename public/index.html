<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lumyra</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --bg1:#141414;
  --bg2:#1a1a1a;
  --bg3:#222;
  --hover:#252525;
  --stroke:#2a2a2a;
  --stroke2:#333;
  --txt:#e8e8e8;
  --txt2:#888;
  --txt3:#444;
  --accent:#5b6bf8;
  --accent-h:#6b7bff;
  --green:#3dd68c;
  --red:#ff5f57;
  --yellow:#f5a623;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select{font-family:inherit;outline:none}
.page{display:none;min-height:100vh}
.page.active{display:flex}
#loginPage{align-items:center;justify-content:center;background:var(--bg)}
.login-wrap{width:360px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-box{
  width:30px;height:30px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;flex-shrink:0;color:#fff;
  clip-path:path('M15,0 C22,0 30,8 30,15 C30,22 22,30 15,30 C8,30 0,22 0,15 C0,8 8,0 15,0 Z');
}
.logo-name{font-weight:700;font-size:15px;filter:drop-shadow(0 0 8px #7b6bf8aa)}
.logo-name em{color:#c4bfff;font-style:normal}
.logo-name span{color:#7b6bf8}
.login-card{background:var(--bg1);border:1px solid var(--stroke);padding:28px;border-radius:26px}
.login-card h2{font-size:14px;font-weight:600;margin-bottom:4px}
.login-card p{color:var(--txt2);font-size:12px;margin-bottom:22px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:11px;color:var(--txt2);font-weight:500}
.field input{background:var(--bg);border:1px solid var(--stroke2);color:var(--txt);padding:10px 13px;font-size:13px;transition:border-color .15s;border-radius:14px}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--txt3)}
.err-msg{font-size:11px;color:var(--red);min-height:16px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:600;padding:9px 18px;transition:background .15s,opacity .15s;border:none;border-radius:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-h)}
.btn-ghost{background:transparent;border:1px solid var(--stroke2);color:var(--txt2);border-radius:12px}
.btn-ghost:hover:not(:disabled){background:var(--hover);color:var(--txt)}
.btn-danger{background:#ff5f5715;border:1px solid #ff5f5730;color:var(--red);border-radius:12px}
.btn-danger:hover:not(:disabled){background:#ff5f5725}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-icon{width:28px;height:28px;padding:0;border-radius:10px}
.btn-full{width:100%}
#dashPage{flex-direction:column}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--stroke);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{
  width:24px;height:24px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;color:#fff;
  clip-path:path('M12,0 C18.3,0 24,5.7 24,12 C24,18.3 18.3,24 12,24 C5.7,24 0,18.3 0,12 C0,5.7 5.7,0 12,0 Z');
}
.topbar-name{font-weight:700;font-size:12px;filter:drop-shadow(0 0 6px #7b6bf888)}
.topbar-name em{color:#c4bfff;font-style:normal}
.topbar-name span{color:#7b6bf8}
.topbar-divider{width:1px;height:16px;background:var(--stroke2);margin:0 4px}
.topbar-section{color:var(--txt2);font-size:12px}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-badge{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--stroke);padding:5px 11px;font-size:11px;color:var(--txt2);border-radius:12px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);transition:background .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.status-dot.off{background:var(--red)}
.body{flex:1;padding:24px;max-width:1080px;width:100%;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--stroke);padding:16px 18px;border-radius:20px}
.stat-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:600}
.stat-val{font-size:24px;font-weight:700}
.stat-val.c-accent{color:var(--accent)}
.stat-val.c-green{color:var(--green)}
.stat-val.c-red{color:var(--red)}
.card{background:var(--bg1);border:1px solid var(--stroke);overflow:hidden;margin-bottom:12px;border-radius:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--stroke)}
.card-title{font-size:12px;font-weight:600}
.card-actions{display:flex;align-items:center;gap:8px}
.gen-bar{padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gen-bar input{background:var(--bg);border:1px solid var(--stroke2);color:var(--txt);padding:8px 11px;width:80px;border-radius:12px}
.gen-bar input:focus{border-color:var(--accent)}
.gen-bar input::placeholder{color:var(--txt3)}
.gen-hint{font-size:11px;color:var(--txt3)}
.del-bar{padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--stroke)}
.del-bar input{background:var(--bg);border:1px solid var(--stroke2);color:var(--txt);padding:8px 11px;width:80px;border-radius:12px}
.del-bar input:focus{border-color:var(--red)}
.del-bar input::placeholder{color:var(--txt3)}
.del-hint{font-size:11px;color:var(--txt3)}
.search-row{display:flex;align-items:center;gap:8px}
.search-row input{background:var(--bg);border:1px solid var(--stroke2);color:var(--txt);padding:7px 11px;width:200px;border-radius:12px}
.search-row input:focus{border-color:var(--accent)}
.search-row input::placeholder{color:var(--txt3)}
.search-row select{background:var(--bg);border:1px solid var(--stroke2);color:var(--txt);padding:7px 11px;appearance:none;cursor:pointer;border-radius:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;padding:11px 18px;border-bottom:1px solid var(--stroke)}
td{padding:12px 18px;border-bottom:1px solid #1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#161616}
.key-mono{font-family:'Consolas','Courier New',monospace;font-size:12px;color:#a8a0ff;letter-spacing:.02em}
.copy-text{background:none;border:none;color:var(--txt3);font-size:10px;padding:2px 6px;border-radius:6px;margin-left:4px;cursor:pointer;transition:color .15s,background .15s}
.copy-text:hover{color:var(--txt);background:var(--bg3)}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge-green{background:#3dd68c18;color:var(--green)}
.badge-red{background:#ff5f5718;color:var(--red)}
.badge-gray{background:#33333355;color:var(--txt3)}
.badge-yellow{background:#f5a62318;color:var(--yellow)}
.empty{text-align:center;padding:48px;color:var(--txt3);font-size:12px}
.hwid-text{font-family:'Consolas',monospace;font-size:10px;color:var(--txt2)}
.dim{color:var(--txt3)}
.console-wrap{max-height:180px;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:3px}
.log{display:flex;gap:12px;font-family:'Consolas',monospace;font-size:11px}
.log-t{color:var(--txt3);flex-shrink:0;min-width:70px}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.log-info{color:var(--txt2)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--stroke2);border-radius:16px;padding:11px 16px;font-size:12px;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:#3dd68c33;color:var(--green)}
.toast.err{border-color:#ff5f5733;color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--stroke2);border-radius:2px}
</style>
</head>
<body>

<div class="page active" id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-box">L</div>
      <div class="logo-name"><em>Lum</em><span>yra</span></div>
    </div>
    <div class="login-card">
      <h2>Dashboard</h2>
      <p>Sign in to manage your license keys.</p>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password"/>
      </div>
      <div class="err-msg" id="loginErr"></div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="login()">Sign in</button>
    </div>
  </div>
</div>

<div class="page" id="dashPage">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">L</div>
      <div class="topbar-name"><em>Lum</em><span>yra</span></div>
      <div class="topbar-divider"></div>
      <div class="topbar-section">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="status-badge">
        <div class="status-dot" id="sDot"></div>
        <span id="sTxt">Checking</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="body">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val c-accent" id="sTotal">—</div></div>
      <div class="stat"><div class="stat-label">Unused</div><div class="stat-val" id="sUnused">—</div></div>
      <div class="stat"><div class="stat-label">Active</div><div class="stat-val c-green" id="sUsed">—</div></div>
      <div class="stat"><div class="stat-label">Expired</div><div class="stat-val c-red" id="sExpired">—</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Generate Keys</div>
      </div>
      <div class="gen-bar">
        <input type="number" id="genAmt" value="1" min="1" max="100" placeholder="Amount"/>
        <input type="number" id="genDays" placeholder="Days"/>
        <button class="btn btn-primary btn-sm" onclick="generateKeys()">Generate</button>
        <span class="gen-hint">Leave days empty for 24h default</span>
      </div>
      <div class="del-bar">
        <input type="number" id="delAmt" min="1" placeholder="Amount"/>
        <button class="btn btn-danger btn-sm" onclick="deleteSomeKeys()">Delete amount</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAllKeys()">Delete all keys</button>
        <span class="del-hint">Deletes oldest keys first</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Keys</div>
        <div class="card-actions">
          <div class="search-row">
            <input type="text" id="searchIn" placeholder="Search keys..." oninput="renderTable()"/>
            <select id="filterSel" onchange="renderTable()">
              <option value="all">All</option>
              <option value="unused">Unused</option>
              <option value="used">Active</option>
              <option value="expired">Expired</option>
            </select>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="loadKeys()">↻</button>
        </div>
      </div>
      <div id="tableWrap"><div class="empty">No keys yet.</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Console</div>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="clearLog()">✕</button>
      </div>
      <div class="console-wrap" id="console"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let token = localStorage.getItem("_lt") || "";
let allKeys = [];
let toastT;

function show(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function login() {
  const pw = document.getElementById("pwInput").value;
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("loginErr");
  if (!pw) { err.textContent = "Enter your password."; return; }
  btn.disabled = true;
  btn.textContent = "Signing in...";
  err.textContent = "";
  try {
    const r = await fetch(`${API}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) {
      err.textContent = d.error || "Wrong password.";
      btn.disabled = false;
      btn.textContent = "Sign in";
      return;
    }
    token = d.token;
    localStorage.setItem("_lt", token);
    document.getElementById("pwInput").value = "";
    show("dashPage");
    await loadKeys();
    checkStatus();
    log("Signed in.", "info");
  } catch {
    err.textContent = "Could not connect.";
    btn.disabled = false;
    btn.textContent = "Sign in";
  }
}

function logout() {
  token = "";
  localStorage.removeItem("_lt");
  allKeys = [];
  show("loginPage");
}

document.getElementById("pwInput").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

async function authed(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: { ...(opts.headers || {}), "Authorization": `Bearer ${token}` }
  });
  if (r.status === 401) { logout(); return null; }
  return r;
}

async function loadKeys() {
  try {
    const r = await authed(`${API}/api/keys`);
    if (!r) return;
    allKeys = await r.json();
    updateStats();
    renderTable();
    log("Keys loaded.", "info");
  } catch { log("Failed to load keys.", "err"); }
}

async function generateKeys() {
  const amount = parseInt(document.getElementById("genAmt").value) || 1;
  const days = document.getElementById("genDays").value;
  try {
    const r = await authed(`${API}/api/keys`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount, expiresInDays: days ? parseInt(days) : null })
    });
    if (!r) return;
    const data = await r.json();
    log(`Generated ${data.length} key(s).`, "ok");
    toast(`Generated ${data.length} key(s)`, "ok");
    await loadKeys();
  } catch { log("Failed to generate keys.", "err"); }
}

async function deleteKey(id, key) {
  if (!confirm(`Delete ${key}?`)) return;
  try {
    const r = await authed(`${API}/api/keys`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
    if (!r) return;
    log(`Deleted ${key}.`, "ok");
    toast("Deleted", "ok");
    await loadKeys();
  } catch { log("Failed to delete key.", "err"); }
}

async function deleteAllKeys() {
  if (!confirm(`Delete ALL ${allKeys.length} keys? This cannot be undone.`)) return;
  try {
    const r = await authed(`${API}/api/keys`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deleteAll: true })
    });
    if (!r) return;
    const data = await r.json();
    log(`Deleted all keys (${data.deleted}).`, "ok");
    toast(`Deleted ${data.deleted} keys`, "ok");
    await loadKeys();
  } catch { log("Failed to delete all keys.", "err"); }
}

async function deleteSomeKeys() {
  const amt = parseInt(document.getElementById("delAmt").value);
  if (!amt || amt < 1) { toast("Enter a valid amount", "err"); return; }
  if (!confirm(`Delete ${amt} key(s)?`)) return;
  try {
    const r = await authed(`${API}/api/keys`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deleteAmount: amt })
    });
    if (!r) return;
    const data = await r.json();
    log(`Deleted ${data.deleted} key(s).`, "ok");
    toast(`Deleted ${data.deleted} key(s)`, "ok");
    await loadKeys();
  } catch { log("Failed to delete keys.", "err"); }
}

function updateStats() {
  const now = new Date();
  const expired = allKeys.filter(k => k.expires_at && new Date(k.expires_at) < now).length;
  const used = allKeys.filter(k => k.used).length;
  document.getElementById("sTotal").textContent   = allKeys.length;
  document.getElementById("sUnused").textContent  = allKeys.length - used;
  document.getElementById("sUsed").textContent    = used;
  document.getElementById("sExpired").textContent = expired;
}

function renderTable() {
  const search = document.getElementById("searchIn").value.toLowerCase();
  const filter = document.getElementById("filterSel").value;
  const now = new Date();
  const keys = allKeys.filter(k => {
    const exp = k.expires_at && new Date(k.expires_at) < now;
    if (filter === "unused"  && (k.used || exp)) return false;
    if (filter === "used"    && !k.used) return false;
    if (filter === "expired" && !exp) return false;
    if (search && !k.key.toLowerCase().includes(search)) return false;
    return true;
  });
  if (!keys.length) {
    document.getElementById("tableWrap").innerHTML = '<div class="empty">No keys found.</div>';
    return;
  }
  const rows = keys.map(k => {
    const exp = k.expires_at && new Date(k.expires_at) < now;
    const badge = exp
      ? `<span class="badge badge-red">Expired</span>`
      : k.used
        ? `<span class="badge badge-green">Active</span>`
        : `<span class="badge badge-gray">Unused</span>`;
    const expiry = k.expires_at
      ? (() => {
          const d = new Date(k.expires_at);
          const diff = d - now;
          if (diff > 0 && diff < 86400000) {
            const h = Math.floor(diff / 3600000);
            return `<span class="badge badge-yellow">${h}h left</span>`;
          }
          return `<span class="${exp ? 'dim' : ''}">${d.toLocaleDateString()}</span>`;
        })()
      : '<span class="dim">Never</span>';
    const usedAt = k.used_at ? new Date(k.used_at).toLocaleString() : '<span class="dim">—</span>';
    const hwid = k.hwid ? `<span class="hwid-text">${k.hwid.substring(0,14)}…</span>` : '<span class="dim">—</span>';
    return `<tr>
      <td><span class="key-mono">${k.key}</span><button class="copy-text" onclick="copyKey('${k.key}')">copy</button></td>
      <td>${badge}</td>
      <td>${expiry}</td>
      <td>${usedAt}</td>
      <td>${hwid}</td>
      <td><button class="btn btn-danger btn-icon" onclick="deleteKey('${k.id}','${k.key}')">✕</button></td>
    </tr>`;
  }).join("");
  document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead><tr><th>Key</th><th>Status</th><th>Expires</th><th>Used At</th><th>HWID</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function copyKey(key) {
  navigator.clipboard.writeText(key);
  toast("Copied", "ok");
}

function log(msg, type = "info") {
  const el = document.getElementById("console");
  const t = new Date().toLocaleTimeString();
  const d = document.createElement("div");
  d.className = "log";
  d.innerHTML = `<span class="log-t">${t}</span><span class="log-${type}">${msg}</span>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById("console").innerHTML = "";
}

function toast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = "toast", 2200);
}

async function checkStatus() {
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    if (d.status === "ok") {
      document.getElementById("sDot").className = "status-dot on";
      document.getElementById("sTxt").textContent = "Online";
    }
  } catch {
    document.getElementById("sDot").className = "status-dot off";
    document.getElementById("sTxt").textContent = "Offline";
  }
}

if (token) {
  show("dashPage");
  loadKeys();
  checkStatus();
}

setInterval(checkStatus, 30000);
</script>
</body>
</html>
